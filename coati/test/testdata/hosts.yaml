defaults:
  user: ubuntu
  port: 22
  identity_file: ~/.ssh/id_rsa

hosts:
  # Production
  - ip: 10.0.0.10
    hostname: db-prod
    comment: Primary Database

  - ip: 10.0.0.11
    hostname: web-prod
    aliases: [www]
    comment: Web Server

  # Development
  - ip: 192.168.1.50
    hostname: db-dev
    user: dev-user

  - ip: 192.168.1.51
    hostname: web-dev
    port: 2222

  - ip: 127.0.0.5
    hostname: local-test
